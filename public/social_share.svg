<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="40%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    
    <!-- Title Text Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>

    <!-- Header Gradient -->
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>

    <!-- Drop Shadow for Cards -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.04"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Ambient Decorative Background Shapes -->
  <circle cx="950" cy="150" r="280" fill="#3b82f6" fill-opacity="0.04" />
  <circle cx="150" cy="500" r="200" fill="#6366f1" fill-opacity="0.03" />
  
  <!-- 1. Top Utility Header Bar -->
  <rect width="1200" height="42" fill="url(#headerGrad)"/>
  <circle cx="35" cy="21" r="5" fill="#10b981"/>
  <text x="50" y="25" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="12" font-weight="500">MẠNG AN SINH SỐ HÓA PHƯỜNG PHÚ LỢI, TP. HỒ CHÍ MINH</text>
  <text x="1000" y="25" fill="#38bdf8" font-family="'Inter', sans-serif" font-size="12" font-weight="bold">● TRỰC TUYẾN: 17</text>
  <text x="1120" y="25" fill="#ffffff" font-family="'Inter', sans-serif" font-size="12" font-weight="500">Lượt truy cập: 14.492</text>

  <!-- 2. Main Portal Brand Header -->
  <g transform="translate(60, 70)">
    <!-- Government/Community Badge Icons -->
    <rect width="52" height="52" rx="14" fill="#3b82f6" fill-opacity="0.1"/>
    <path d="M14 38V22H38V38H14Z" fill="#2563eb" fill-opacity="0.8"/>
    <path d="M10 22L26 10L42 22H10Z" fill="#1d4ed8"/>
    <circle cx="42" cy="40" r="10" fill="#ef4444"/>
    <path d="M39 40L41 42L45 38" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    
    <!-- Title Text and Slogan -->
    <text x="68" y="22" fill="#0f172a" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="22" font-weight="bold" letter-spacing="-0.5">CỔNG AN SINH XÃ HỘI SỐ</text>
    <text x="68" y="42" fill="#475569" font-family="'Inter', sans-serif" font-size="13" font-weight="500" letter-spacing="1">ỦY BAN MTTQ VIỆT NAM PHƯỜNG PHÚ LỢI, TP. HỒ CHÍ MINH</text>
    
    <rect x="330" y="4" width="45" height="22" rx="6" fill="#2563eb"/>
    <text x="352" y="19" fill="#ffffff" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" text-anchor="middle">V3.0</text>
  </g>

  <!-- Left Main Content Area -->
  <g transform="translate(60, 170)">
    <!-- Accent Line Badge -->
    <rect width="250" height="32" rx="16" fill="#dbeafe" fill-opacity="0.8" stroke="#bfdbfe" stroke-width="1"/>
    <circle cx="20" cy="16" r="4" fill="#2563eb"/>
    <text x="32" y="20" fill="#1e40af" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" letter-spacing="0.5">CHÍNH SÁCH NHÂN VĂN • NGHĨA TÌNH</text>

    <!-- Main Title (Matches screenshot perfectly) -->
    <text x="0" y="85" fill="url(#textGrad)" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="44" font-weight="800" letter-spacing="-1.5">Vì một cộng đồng</text>
    <text x="0" y="145" fill="url(#textGrad)" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="44" font-weight="800" letter-spacing="-1.5">Phú Lợi thân thiện</text>
    <text x="0" y="205" fill="url(#textGrad)" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="44" font-weight="800" letter-spacing="-1.5">văn minh, kết nối số.</text>

    <!-- Description Paragraph -->
    <text x="0" y="250" fill="#334155" font-family="'Inter', sans-serif" font-size="14.5" font-weight="500" width="500">
      Chào mừng bà con nhân dân đến với Cổng An Sinh Xã Hội Số. Đây là không gian
    </text>
    <text x="0" y="275" fill="#334155" font-family="'Inter', sans-serif" font-size="14.5" font-weight="500" width="500">
      công nghệ nghĩa tình hỗ trợ kết nối trực tiếp Ủy ban MTTQ phường, các tổ chức
    </text>
    <text x="0" y="300" fill="#334155" font-family="'Inter', sans-serif" font-size="14.5" font-weight="500" width="500">
      đoàn thể và nhà hảo tâm đến với những hoàn cảnh khó khăn một cách minh bạch.
    </text>

    <!-- Navigation Buttons -->
    <g transform="translate(0, 340)">
      <!-- Button Primary -->
      <rect width="180" height="50" rx="14" fill="#2563eb" filter="url(#cardShadow)"/>
      <text x="90" y="30" fill="#ffffff" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" text-anchor="middle">SỬ DỤNG DỊCH VỤ</text>

      <!-- Button Secondary -->
      <rect x="195" width="180" height="50" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="285" y="30" fill="#334155" font-family="'Inter', sans-serif" font-size="13" font-weight="bold" text-anchor="middle">HỎI TRỢ LÝ ẢO AI</text>
    </g>
  </g>

  <!-- Right Sidebar Mockup Card (Màn giám sát an sinh) -->
  <g transform="translate(680, 140)" filter="url(#shadow)">
    <!-- Container Card -->
    <rect width="460" height="420" rx="30" fill="#ffffff"/>
    
    <!-- Card Header -->
    <g transform="translate(30, 35)">
      <circle cx="20" cy="20" r="20" fill="#dbeafe"/>
      <!-- Government building icon overlay simplified -->
      <path d="M12 28V20H28V28H12Z" fill="#1e40af"/>
      <path d="M10 20L20 12L30 20H10Z" fill="#2563eb"/>

      <text x="50" y="16" fill="#0f172a" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="18" font-weight="bold">MÀN GIÁM SÁT AN SINH</text>
      <text x="50" y="34" fill="#10b981" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" letter-spacing="1">CẬP NHẬT TRỰC TUYẾN ĐỊA BÀN</text>
    </g>

    <!-- Inner Live Event Card -->
    <g transform="translate(30, 105)">
      <rect width="400" height="150" rx="20" fill="#f8fafc" stroke="#f1f5f9" stroke-width="1"/>
      
      <!-- Checked Indicator -->
      <circle cx="35" cy="45" r="16" fill="#10b981" fill-opacity="0.1"/>
      <path d="M29 45L33 49L41 41" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

      <!-- Category Tag -->
      <rect x="70" y="25" width="145" height="24" rx="8" fill="#fef3c7" stroke="#fde68a" stroke-width="1"/>
      <text x="142.5" y="41" fill="#92400e" font-family="'Inter', sans-serif" font-size="11" font-weight="bold" text-anchor="middle">CỨU TRỢ KHẨN CẤP</text>
      
      <text x="365" y="40" fill="#64748b" font-family="'Inter', sans-serif" font-size="11" font-weight="normal" text-anchor="end">Vừa xong ↗</text>

      <!-- Event Title description -->
      <text x="70" y="74" fill="#1e293b" font-family="'Inter', sans-serif" font-size="13.5" font-weight="bold">Bàn giao túi thuốc an sinh đột xuất và hỗ trợ y tế</text>
      <text x="70" y="96" fill="#475569" font-family="'Inter', sans-serif" font-size="13.5" font-weight="bold">khẩn cấp tại nhà cho hộ cụ Lê Văn Hùng...</text>
      <text x="70" y="118" fill="#64748b" font-family="'Inter', sans-serif" font-size="12" font-weight="normal">Địa chỉ: Khu phố 3, Phường Phú Lợi, TP. Hồ Chí Minh</text>
    </g>

    <!-- Sub-Metrics grid -->
    <g transform="translate(30, 275)">
      <!-- Metric Left -->
      <rect width="190" height="100" rx="20" fill="#eff6ff" stroke="#e0f2fe" stroke-width="1"/>
      <circle cx="35" cy="35" r="14" fill="#3b82f6" fill-opacity="0.15"/>
      <path d="M35 30V40M30 35H40" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
      <text x="60" y="40" fill="#1e3a8a" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="14" font-weight="bold">Xác Minh 24h</text>
      <text x="25" y="78" fill="#475569" font-family="'Inter', sans-serif" font-size="11.5" font-weight="500">Hệ thống xử lý trực tuyến</text>

      <!-- Metric Right -->
      <rect x="210" width="190" height="100" rx="20" fill="#f0fdf4" stroke="#dcfce7" stroke-width="1"/>
      <circle cx="245" cy="35" r="14" fill="#22c55e" fill-opacity="0.15"/>
      <path d="M241 33L244 36L249 31" stroke="#15803d" stroke-width="2" stroke-linecap="round" fill="none"/>
      <text x="270" y="40" fill="#14532d" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="14" font-weight="bold">Tấm Lòng Vàng</text>
      <text x="235" y="78" fill="#475569" font-family="'Inter', sans-serif" font-size="11.5" font-weight="500">Ghi nhận minh bạch tự động</text>
    </g>
  </g>

  <!-- Floating Heart Badge on the right corner (Gửi yêu thương) -->
  <g transform="translate(1000, 520)" filter="url(#shadow)">
    <rect width="150" height="52" rx="26" fill="#e11d48"/>
    <!-- Heart Icon -->
    <path d="M28 26 C28 20, 38 20, 38 26 C38 31, 28 35, 28 35 C28 35, 18 31, 18 26 C18 20, 28 20, 28 26" fill="#ffffff" stroke="#ffffff" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="85" y="25" fill="#ffffff" font-family="'Inter', sans-serif" font-size="11" font-weight="extrabold" text-anchor="middle">GỬI YÊU THƯƠNG</text>
    <text x="85" y="39" fill="#ffe4e6" font-family="'Space Grotesk', 'Inter', sans-serif" font-size="12" font-weight="bold" text-anchor="middle">13.360 tim</text>
  </g>
</svg>
